<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>木德MOOD X 重慶行程</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap');

        :root {
            --m-red: #a67b78;
            --m-dark: #7d5a57;
            --m-soft: #f4efee;
            --m-bg: #faf9f9;
            --text: #5e5453;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--m-bg);
            color: var(--text);
            margin: 0;
            scroll-behavior: smooth;
        }

        /* 頂部導航 */
        header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            text-align: center;
            border-bottom: 1px solid var(--m-soft);
        }

        .logo {
            font-size: 1.2rem;
            letter-spacing: 2px;
            font-weight: 700;
            color: var(--m-red);
            margin-bottom: 15px;
            display: block;
        }

        .buy-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn-minimal {
            text-decoration: none;
            color: var(--m-red);
            border: 1px solid var(--m-red);
            padding: 6px 20px;
            border-radius: 50px;
            font-size: 13px;
            transition: all 0.3s ease;
            background: transparent;
        }

        .btn-minimal:hover {
            background: var(--m-red);
            color: white;
        }

        /* 主要內容排版 */
        .wrapper {
            max-width: 1000px;
            margin: 40px auto;
            display: flex;
            gap: 40px;
            padding: 0 20px;
        }

        /* 側邊欄 */
        .sidebar {
            width: 220px;
            position: sticky;
            top: 140px;
            height: fit-content;
        }

        .nav-group {
            margin-bottom: 25px;
        }

        .nav-group b {
            display: block;
            font-size: 15px;
            margin-bottom: 10px;
            color: var(--m-dark);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-group ul {
            list-style: none;
            padding-left: 10px;
            margin: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }

        .nav-group a {
            text-decoration: none;
            color: #999;
            font-size: 13px;
            display: block;
            padding: 6px 0;
            transition: 0.3s;
        }

        .nav-group a:hover { color: var(--m-red); }

        /* 行程卡片 */
        .content { flex: 1; }
        .day-section { margin-bottom: 60px; }
        .day-title { font-size: 24px; font-weight: 300; margin-bottom: 30px; border-bottom: 1px solid var(--m-soft); display: inline-block; }

        .spot-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            margin-bottom: 20px;
        }

        .spot-img {
            width: 100%;
            height: 200px;
            background-size: cover;
            background-position: center;
            background-color: #eee;
        }

        .spot-info { padding: 20px; }
        .spot-info h4 { margin: 0 0 10px 0; font-size: 18px; color: var(--m-dark); }
        .spot-info p { margin: 0; font-size: 14px; color: #888; margin-bottom: 15px; }

        /* 路程箭頭 */
        .path-arrow {
            text-align: center;
            padding: 15px 0;
            position: relative;
            color: var(--m-red);
            font-size: 12px;
            font-weight: 300;
        }
        .path-arrow::before {
            content: "↓";
            display: block;
            font-size: 20px;
        }

        /* 記帳與行李 */
        .tool-card { background: white; padding: 25px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        input, select { 
            width: 100%; border: none; border-bottom: 1px solid var(--m-soft); 
            padding: 10px 0; margin-bottom: 15px; background: transparent; color: var(--text); outline: none;
        }
        .check-item { display: flex; align-items: center; gap: 10px; font-size: 14px; margin-bottom: 8px; color: #777; }

        @media (max-width: 768px) {
            .wrapper { flex-direction: column; }
            .sidebar { width: 100%; position: static; }
        }
    </style>
</head>
<body>

<header>
    <span class="logo">MOOD X CHONGQING</span>
    <div class="buy-bar">
        <a href="https://www.trip.com/t/EDilODF4vT2" target="_blank" class="btn-minimal">機票</a>
        <a href="https://www.trip.com/t/ZZaQNaF4vT2" target="_blank" class="btn-minimal">住宿</a>
        <a href="https://www.kkday.com/zh-tw/portable-travel-wifi-sim-card?cid=22347" target="_blank" class="btn-minimal">eSIM</a>
        <a href="https://www.trip.com/t/qw7haaR4vT2" target="_blank" class="btn-minimal">門票</a>
        <a href="https://www.kkday.com/zh-tw/category/global/experiences?cid=22347" target="_blank" class="btn-minimal">一日遊</a>
    </div>
</header>

<div class="wrapper">
    <aside class="sidebar">
        <div class="nav-group">
            <b onclick="toggleNav('itinerary-list')">每日推薦行程 <span>▾</span></b>
            <ul id="itinerary-list">
                <li><a href="#day1">Day 1 山城初探</a></li>
                <li><a href="#day2">Day 2 魔幻軌道</a></li>
                <li><a href="#day3">Day 3 藝文古鎮</a></li>
            </ul>
        </div>
        <div class="nav-group">
            <b>當日天氣</b>
            <div style="font-size: 12px; color: #999;">重慶 18°C / 陰天</div>
        </div>
        <div class="nav-group">
            <b>必吃店家</b>
            <ul>
                <li><a href="#food">珮姐老火鍋</a></li>
                <li><a href="#food">一隻酸奶牛</a></li>
            </ul>
        </div>
        <div class="nav-group">
            <b>小工具</b>
            <ul>
                <li><a href="#tools">旅行記帳</a></li>
                <li><a href="#checklist">行李清單</a></li>
            </ul>
        </div>
    </aside>

    <main class="content">
        <section id="day1" class="day-section">
            <h3 class="day-title">Day 1</h3>
            
            <div class="spot-card">
                <div class="spot-img" style="background-image: url('https://images.unsplash.com/photo-1541311634027-28564177d33d?auto=format&fit=crop&w=800&q=80');"></div>
                <div class="spot-info">
                    <h4>解放碑步行街</h4>
                    <p>重慶的心臟地帶，適合拍城市時尚大片。</p>
                    <a href="https://www.trip.com/t/qw7haaR4vT2" class="btn-minimal">預約周邊體驗</a>
                </div>
            </div>

            <div class="path-arrow">步行 15 分鐘</div>

            <div class="spot-card">
                <div class="spot-img" style="background-image: url('https://images.unsplash.com/photo-1521791146066-b339c1d6365a?auto=format&fit=crop&w=800&q=80');"></div>
                <div class="spot-info">
                    <h4>洪崖洞</h4>
                    <p>《神隱少女》風格夜景，建議 19:30 燈亮後前往。</p>
                </div>
            </div>
        </section>

        <section id="tools" class="day-section">
            <h3 class="day-title">旅行記帳</h3>
            <div class="tool-card">
                <input type="text" id="acc-item" placeholder="項目內容">
                <input type="number" id="acc-amount" placeholder="總金額">
                <select id="acc-split">
                    <option value="1">個人支付</option>
                    <option value="2">2 人平分</option>
                    <option value="3">3 人平分</option>
                </select>
                <button onclick="addExpense()" class="btn-minimal" style="width:100%; margin-top:10px;">記錄紀錄</button>
                <div id="total-box" style="margin-top:20px; border-top: 1px solid var(--m-soft); padding-top:15px;">
                    <span style="font-size: 13px;">個人負擔總計</span>
                    <div style="font-size: 24px; color: var(--m-red); font-weight: bold;">$ <span id="total-personal">0</span></div>
                </div>
            </div>
        </section>

        <section id="checklist" class="day-section">
            <h3 class="day-title">行李清單</h3>
            <div class="tool-card">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div>
                        <p style="font-weight: bold; font-size: 14px;">證件</p>
                        <div class="check-item"><input type="checkbox"> 護照</div>
                        <div class="check-item"><input type="checkbox"> 台胞證</div>
                        <div class="check-item"><input type="checkbox"> 國際駕照</div>
                    </div>
                    <div>
                        <p style="font-weight: bold; font-size: 14px;">電子</p>
                        <div class="check-item"><input type="checkbox"> 轉接頭</div>
                        <div class="check-item"><input type="checkbox"> 行動電源</div>
                        <div class="check-item"><input type="checkbox"> 充電線</div>
                    </div>
                </div>
            </div>
        </section>
    </main>
</div>

<script>
    // 導覽列折疊
    function toggleNav(id) {
        const el = document.getElementById(id);
        if (el.style.maxHeight) {
            el.style.maxHeight = null;
        } else {
            el.style.maxHeight = el.scrollHeight + "px";
        }
    }

    // 記帳
    let totalPersonal = 0;
    function addExpense() {
        const amount = parseFloat(document.getElementById('acc-amount').value);
        const split = parseInt(document.getElementById('acc-split').value);
        if (amount) {
            totalPersonal += (amount / split);
            document.getElementById('total-personal').innerText = totalPersonal.toFixed(2);
            document.getElementById('acc-amount').value = '';
            document.getElementById('acc-item').value = '';
        }
    }
</script>

</body>
</html>
