<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>木德MOOD X 重慶行程</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap');

        :root {
            --m-red: #a67b78;
            --m-dark: #7d5a57;
            --m-soft: #f4efee;
            --m-bg: #faf9f9;
            --text: #5e5453;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--m-bg);
            color: var(--text);
            margin: 0;
            scroll-behavior: smooth;
        }

        header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            text-align: center;
            border-bottom: 1px solid var(--m-soft);
        }

        .logo {
            font-size: 1.2rem;
            letter-spacing: 2px;
            font-weight: 700;
            color: var(--m-red);
            margin-bottom: 15px;
            display: block;
        }

        .buy-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn-minimal {
            text-decoration: none;
            color: var(--m-red);
            border: 1px solid var(--m-red);
            padding: 6px 20px;
            border-radius: 50px;
            font-size: 13px;
            transition: 0.3s;
            background: transparent;
            cursor: pointer;
        }

        .btn-minimal:hover {
            background: var(--m-red);
            color: white;
        }

        .wrapper {
            max-width: 900px;
            margin: 40px auto;
            display: flex;
            gap: 40px;
            padding: 0 20px;
        }

        /* 側邊欄 */
        .sidebar {
            width: 200px;
            position: sticky;
            top: 150px;
            height: fit-content;
        }

        .nav-group { margin-bottom: 30px; }
        .nav-group b {
            display: flex;
            justify-content: space-between;
            font-size: 16px;
            color: #333;
            cursor: pointer;
            margin-bottom: 12px;
            font-weight: 700; /* 粗體 */
        }

        .nav-group ul {
            list-style: none;
            padding-left: 0;
            margin: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }

        .nav-group a {
            text-decoration: none;
            color: #888;
            font-size: 14px;
            display: block;
            padding: 8px 0;
            transition: 0.3s;
        }

        .nav-group a:hover { color: var(--m-red); }

        /* 主內容 */
        .content { flex: 1; }
        section { margin-bottom: 60px; }
        .section-title { font-size: 22px; font-weight: 700; margin-bottom: 25px; color: var(--m-dark); }

        /* 行程卡片 */
        .spot-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            margin-bottom: 15px;
        }
        .spot-img { width: 100%; height: 220px; background-size: cover; background-position: center; background-color: #eee; }
        .spot-info { padding: 25px; }
        .spot-info h4 { margin: 0 0 10px 0; font-size: 18px; }
        .spot-info p { margin: 0 0 15px 0; font-size: 14px; color: #999; }

        .path-arrow {
            text-align: center;
            padding: 20px 0;
            color: var(--m-red);
            font-size: 13px;
            font-weight: 300;
        }
        .path-arrow::before { content: "↓"; display: block; font-size: 24px; margin-bottom: 5px; }

        /* 天氣 Iframe */
        .weather-container {
            width: 100%;
            height: 450px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border: 1px solid var(--m-soft);
        }

        /* 工具與清單 */
        .card-ui { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        .checklist-cat { margin-bottom: 25px; }
        .checklist-cat h5 { margin: 0 0 15px 0; color: var(--m-red); font-size: 15px; border-bottom: 1px solid var(--m-soft); padding-bottom: 5px; }
        .check-item { display: flex; align-items: center; gap: 12px; font-size: 15px; margin-bottom: 10px; cursor: pointer; color: #666; }
        .check-item input { accent-color: var(--m-red); width: 18px; height: 18px; }

        input[type="text"], input[type="number"], select {
            width: 100%; border: none; border-bottom: 1px solid var(--m-soft); padding: 12px 0; margin-bottom: 15px; outline: none; font-size: 15px;
        }

        @media (max-width: 768px) {
            .wrapper { flex-direction: column; }
            .sidebar { width: 100%; position: static; }
        }
    </style>
</head>
<body>

<header>
    <span class="logo">MOOD X CHONGQING</span>
    <div class="buy-bar">
        <a href="https://www.trip.com/t/EDilODF4vT2" target="_blank" class="btn-minimal">機票</a>
        <a href="https://www.trip.com/t/ZZaQNaF4vT2" target="_blank" class="btn-minimal">住宿</a>
        <a href="https://www.kkday.com/zh-tw/portable-travel-wifi-sim-card?cid=22347" target="_blank" class="btn-minimal">eSIM</a>
        <a href="https://www.trip.com/t/qw7haaR4vT2" target="_blank" class="btn-minimal">門票</a>
        <a href="https://www.kkday.com/zh-tw/category/global/experiences?cid=22347" target="_blank" class="btn-minimal">一日遊</a>
    </div>
</header>

<div class="wrapper">
    <aside class="sidebar">
        <div class="nav-group">
            <b onclick="toggleNav('nav-days')">每日推薦行程 <span>▾</span></b>
            <ul id="nav-days">
                <li><a href="#day1">Day 1 山城空間</a></li>
                <li><a href="#day2">Day 2 魔幻交通</a></li>
                <li><a href="#day3">Day 3 歲月古鎮</a></li>
            </ul>
        </div>
        <div class="nav-group">
            <b onclick="location.href='#weather-sec'">當日天氣</b>
        </div>
        <div class="nav-group">
            <b onclick="toggleNav('nav-food')">必吃店家 <span>▾</span></b>
            <ul id="nav-food">
                <li><a href="#food">珮姐老火鍋</a></li>
                <li><a href="#food">磁器口陳麻花</a></li>
            </ul>
        </div>
        <div class="nav-group">
            <b onclick="toggleNav('nav-tools')">小工具 <span>▾</span></b>
            <ul id="nav-tools" style="max-height: 200px;">
                <li><a href="#accounting">旅行記帳</a></li>
                <li><a href="#checklist">行李清單</a></li>
            </ul>
        </div>
    </aside>

    <main class="content">
        <section id="day1">
            <div class="section-title">Day 1</div>
            <div class="spot-card">
                <div class="spot-img" style="background-image: url('https://images.unsplash.com/photo-1541311634027-28564177d33d?auto=format&fit=crop&w=800&q=80');"></div>
                <div class="spot-info">
                    <h4>解放碑</h4>
                    <p>重慶地標，建議傍晚抵達感受繁華。</p>
                    <a href="https://www.trip.com/t/qw7haaR4vT2" target="_blank" class="btn-minimal">購買門票</a>
                </div>
            </div>
            <div class="path-arrow">步行 15 分鐘</div>
            <div class="spot-card">
                <div class="spot-img" style="background-image: url('https://images.unsplash.com/photo-1521791146066-b339c1d6365a?auto=format&fit=crop&w=800&q=80');"></div>
                <div class="spot-info">
                    <h4>洪崖洞夜景</h4>
                    <p>千廝門大橋是最佳拍攝點。</p>
                </div>
            </div>
        </section>

        <section id="weather-sec">
            <div class="section-title">當日天氣</div>
            <div class="weather-container">
                <iframe 
                    src="https://www.google.com/search?q=chongqing+weather&igu=1" 
                    width="100%" height="100%" frameborder="0">
                </iframe>
            </div>
        </section>

        <section id="accounting">
            <div class="section-title">旅行記帳</div>
            <div class="card-ui">
                <input type="text" id="acc-item" placeholder="項目內容">
                <input type="number" id="acc-amount" placeholder="總金額">
                <select id="acc-split">
                    <option value="1">個人支付 (全額)</option>
                    <option value="2">2 人平分</option>
                    <option value="3">3 人平分</option>
                    <option value="4">4 人平分</option>
                </select>
                <button onclick="addExpense()" class="btn-minimal" style="width:100%; margin-top:10px;">記錄紀錄</button>
                <div style="margin-top:25px; text-align: center;">
                    <span style="font-size: 13px; color:#999;">應付總金額</span>
                    <div style="font-size: 28px; color: var(--m-red); font-weight: 700;">$ <span id="total-val">0</span></div>
                </div>
            </div>
        </section>

        <section id="checklist">
            <div class="section-title">行李清單</div>
            <div class="card-ui">
                <div class="checklist-cat">
                    <h5>證件類</h5>
                    <label class="check-item"><input type="checkbox"> 護照</label>
                    <label class="check-item"><input type="checkbox"> 台胞證</label>
                    <label class="check-item"><input type="checkbox"> 身分證</label>
                    <label class="check-item"><input type="checkbox"> 健保卡</label>
                    <label class="check-item"><input type="checkbox"> 國際駕照</label>
                    <label class="check-item"><input type="checkbox"> 入境卡</label>
                </div>
                <div class="checklist-cat">
                    <h5>個人用品類</h5>
                    <label class="check-item"><input type="checkbox"> 衣服 / 褲子 / 內衣褲 / 襪子</label>
                    <label class="check-item"><input type="checkbox"> 睡衣 / 帽子 / 泳衣</label>
                    <label class="check-item"><input type="checkbox"> 拖鞋 / 墨鏡 / 包包</label>
                    <label class="check-item"><input type="checkbox"> 化妝品 / 卸妝保養品</label>
                </div>
                <div class="checklist-cat">
                    <h5>電子類</h5>
                    <label class="check-item"><input type="checkbox"> 轉接頭 / 充電線</label>
                    <label class="check-item"><input type="checkbox"> 行動電源 / 相機</label>
                    <label class="check-item"><input type="checkbox"> 筆電 / 平板</label>
                </div>
                <div class="checklist-cat">
                    <h5>其他</h5>
                    <label class="check-item"><input type="checkbox"> 雨傘、雨衣</label>
                </div>
            </div>
        </section>
    </main>
</div>

<script>
    function toggleNav(id) {
        const el = document.getElementById(id);
        el.style.maxHeight = el.style.maxHeight ? null : el.scrollHeight + "px";
    }

    let total = 0;
    function addExpense() {
        const amount = parseFloat(document.getElementById('acc-amount').value);
        const split = parseInt(document.getElementById('acc-split').value);
        if (amount) {
            total += (amount / split);
            document.getElementById('total-val').innerText = total.toLocaleString(undefined, {minimumFractionDigits: 1});
            document.getElementById('acc-amount').value = '';
            document.getElementById('acc-item').value = '';
        }
    }
</script>

</body>
</html>
